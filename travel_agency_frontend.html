<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Agency</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;}
nav{background:#161b22;border-bottom:1px solid #30363d;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:#fff;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:8px 20px;border-radius:8px;cursor:pointer;color:#8b949e;font-size:14px;font-weight:500;border:none;background:transparent;transition:all 0.2s;}
.nav-tab:hover{color:#e6edf3;background:#21262d;}
.nav-tab.active{color:#fff;background:#6366f1;}
.hero{background:linear-gradient(135deg,#1a1f2e 0%,#161b22 50%,#0d1117 100%);padding:80px 40px;text-align:center;border-bottom:1px solid #30363d;}
.hero h1{font-size:52px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
.hero p{font-size:18px;color:#8b949e;max-width:500px;margin:0 auto 32px;}
.search-bar{display:flex;gap:12px;max-width:600px;margin:0 auto;background:#21262d;border:1px solid #30363d;border-radius:16px;padding:8px;}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:#e6edf3;font-size:15px;padding:8px 12px;}
.search-bar input::placeholder{color:#484f58;}
.search-bar button{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.search-bar button:hover{opacity:0.9;}
.container{max-width:1100px;margin:0 auto;padding:40px 20px;}
.page{display:none;}
.page.active{display:block;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.section-title{font-size:22px;font-weight:700;color:#e6edf3;}
.section-sub{font-size:14px;color:#8b949e;}
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
.trip-card{background:#161b22;border:1px solid #30363d;border-radius:16px;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.trip-card:hover{border-color:#6366f1;transform:translateY(-4px);}
.trip-img{height:180px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;}
.trip-img.paris{background:linear-gradient(135deg,#1e1b4b,#312e81);}
.trip-img.bali{background:linear-gradient(135deg,#064e3b,#065f46);}
.trip-img.tokyo{background:linear-gradient(135deg,#450a0a,#7f1d1d);}
.trip-img.default{background:linear-gradient(135deg,#1e3a5f,#1e40af);}
.trip-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.trip-body{padding:20px;}
.trip-title{font-size:17px;font-weight:700;color:#e6edf3;margin-bottom:8px;}
.trip-meta{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.trip-meta span{font-size:13px;color:#8b949e;display:flex;align-items:center;gap:6px;}
.trip-footer{display:flex;align-items:center;justify-content:space-between;}
.trip-price{font-size:22px;font-weight:800;color:#6366f1;}
.trip-price span{font-size:13px;color:#8b949e;font-weight:400;}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;}
.btn-primary:hover{opacity:0.9;transform:scale(1.02);}
.btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;}
.btn-danger:hover{opacity:0.9;}
.btn-outline{background:transparent;border:1px solid #30363d;color:#e6edf3;}
.btn-outline:hover{border-color:#6366f1;color:#6366f1;}
.form-card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:32px;max-width:560px;margin:0 auto;}
.form-title{font-size:20px;font-weight:700;margin-bottom:24px;color:#e6edf3;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px;font-weight:500;}
.form-group input,.form-group select{width:100%;background:#21262d;border:1px solid #30363d;border-radius:10px;color:#e6edf3;padding:12px 14px;font-size:14px;outline:none;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus{border-color:#6366f1;}
.form-group input::placeholder{color:#484f58;}
.form-group select option{background:#21262d;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.msg{padding:14px 16px;border-radius:10px;font-size:14px;margin-top:16px;display:none;}
.msg.success{background:#0d2818;border:1px solid #16a34a;color:#4ade80;display:block;}
.msg.error{background:#2d0a0a;border:1px solid #dc2626;color:#f87171;display:block;}
.booking-card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:24px;margin-bottom:16px;}
.booking-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.booking-id{font-size:13px;color:#8b949e;}
.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.status-confirmed{background:#0d2818;color:#4ade80;border:1px solid #16a34a;}
.status-cancelled{background:#2d0a0a;color:#f87171;border:1px solid #dc2626;}
.booking-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.detail-item label{font-size:12px;color:#484f58;display:block;margin-bottom:4px;}
.detail-item span{font-size:15px;font-weight:600;color:#e6edf3;}
.refund-result{background:#1e1b4b;border:1px solid #4338ca;border-radius:12px;padding:16px;margin-top:12px;}
.refund-result h4{color:#a78bfa;font-size:14px;font-weight:700;margin-bottom:8px;}
.refund-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.refund-item label{font-size:11px;color:#6366f1;display:block;margin-bottom:2px;}
.refund-item span{font-size:16px;font-weight:700;color:#e6edf3;}
.empty-state{text-align:center;padding:60px 20px;color:#484f58;}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;}
.empty-state p{font-size:16px;}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;}
.stat-label{font-size:12px;color:#8b949e;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:800;color:#6366f1;}
.loading{text-align:center;padding:40px;color:#484f58;font-size:14px;}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-icon">✈</div>
    Travel Agency
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('browse',this)">Browse Trips</button>
    <button class="nav-tab" onclick="switchTab('book',this)">Book</button>
    <button class="nav-tab" onclick="switchTab('mybookings',this)">My Bookings</button>
  </div>
</nav>

<div id="page-browse" class="page active">
  <div class="hero">
    <h1>Explore the World</h1>
    <p>Discover amazing destinations and book your dream trip in seconds.</p>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search destinations, trips..." oninput="filterTrips()"/>
      <button onclick="filterTrips()">Search</button>
    </div>
  </div>
  <div class="container">
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Available Trips</div><div class="stat-value" id="stat-trips">—</div></div>
      <div class="stat-card"><div class="stat-label">Destinations</div><div class="stat-value" id="stat-dest">—</div></div>
      <div class="stat-card"><div class="stat-label">Starting From</div><div class="stat-value" id="stat-price">—</div></div>
    </div>
    <div class="section-header">
      <div><div class="section-title">Available Trips</div><div class="section-sub" id="trips-count"></div></div>
    </div>
    <div class="trips-grid" id="trips-grid"><div class="loading">Loading trips...</div></div>
  </div>
</div>

<div id="page-book" class="page">
  <div class="container">
    <div class="form-card">
      <div class="form-title">Book Your Trip</div>
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" id="b-name" placeholder="Jane Doe"/></div>
        <div class="form-group"><label>Email Address</label><input type="email" id="b-email" placeholder="jane@example.com"/></div>
      </div>
      <div class="form-group"><label>Select Trip</label>
        <select id="b-trip"><option value="">-- Choose a trip --</option></select>
      </div>
      <div class="form-group"><label>Number of Travelers</label><input type="number" id="b-travelers" value="1" min="1" max="20"/></div>
      <div id="price-preview" style="background:#21262d;border-radius:10px;padding:14px;margin-bottom:16px;display:none;">
        <span style="font-size:13px;color:#8b949e;">Estimated total: </span>
        <span id="price-preview-val" style="font-size:18px;font-weight:700;color:#6366f1;"></span>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="bookTrip()">Confirm Booking</button>
      <div class="msg" id="book-msg"></div>
    </div>
  </div>
</div>

<div id="page-mybookings" class="page">
  <div class="container">
    <div class="form-card" style="margin-bottom:28px;">
      <div class="form-title">Find My Bookings</div>
      <div class="form-group"><label>Email Address</label><input type="email" id="lookup-email" placeholder="Enter your email"/></div>
      <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="lookupBookings()">Find Bookings</button>
      <div class="msg" id="lookup-msg"></div>
    </div>
    <div id="bookings-list"></div>
  </div>
</div>

<script>
const API = "https://travel-agency-api-8j0k.onrender.com";
let allTrips = [];
let tripsMap = {};

function switchTab(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  el.classList.add('active');
  if (page === 'browse') loadTrips();
}

function tripEmoji(title) {
  const t = title.toLowerCase();
  if (t.includes('paris')) return { emoji: '🗼', cls: 'paris' };
  if (t.includes('bali')) return { emoji: '🌴', cls: 'bali' };
  if (t.includes('tokyo')) return { emoji: '⛩️', cls: 'tokyo' };
  return { emoji: '✈️', cls: 'default' };
}

async function loadTrips() {
  try {
    const [tripsRes, destsRes] = await Promise.all([
      fetch(`${API}/trips/`),
      fetch(`${API}/destinations/`)
    ]);
    allTrips = await tripsRes.json();
    const dests = await destsRes.json();
    dests.forEach(d => tripsMap[d.id] = d);

    document.getElementById('stat-trips').textContent = allTrips.length;
    document.getElementById('stat-dest').textContent = dests.length;
    const minPrice = allTrips.length ? Math.min(...allTrips.map(t => t.price_per_person)) : 0;
    document.getElementById('stat-price').textContent = minPrice ? `$${minPrice}` : '—';

    renderTrips(allTrips);
    populateTripSelect(allTrips);
  } catch(e) {
    document.getElementById('trips-grid').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load trips. Make sure the API is running.</p></div>';
  }
}

function renderTrips(trips) {
  const grid = document.getElementById('trips-grid');
  document.getElementById('trips-count').textContent = `${trips.length} trip${trips.length !== 1 ? 's' : ''} found`;

  if (!trips.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>No trips match your search.</p></div>';
    return;
  }

  grid.innerHTML = trips.map(t => {
    const dest = tripsMap[t.destination_id] || {};
    const { emoji, cls } = tripEmoji(t.title);
    const available = t.total_seats - t.booked_seats;
    const start = t.start_date.split('T')[0];
    const end = t.end_date.split('T')[0];
    return `
    <div class="trip-card">
      <div class="trip-img ${cls}">
        ${emoji}
        <div class="trip-badge">${available} seats left</div>
      </div>
      <div class="trip-body">
        <div class="trip-title">${t.title}</div>
        <div class="trip-meta">
          <span>📍 ${dest.city || 'Unknown'}, ${dest.country || ''}</span>
          <span>📅 ${start} → ${end}</span>
          <span>💺 ${available} of ${t.total_seats} seats available</span>
        </div>
        <div class="trip-footer">
          <div class="trip-price">$${t.price_per_person}<span>/person</span></div>
          <button class="btn btn-primary" onclick="goBook('${t.id}')">Book Now</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterTrips() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allTrips.filter(t => {
    const dest = tripsMap[t.destination_id] || {};
    return t.title.toLowerCase().includes(q) ||
           (dest.city || '').toLowerCase().includes(q) ||
           (dest.country || '').toLowerCase().includes(q);
  });
  renderTrips(filtered);
}

function populateTripSelect(trips) {
  const sel = document.getElementById('b-trip');
  sel.innerHTML = '<option value="">-- Choose a trip --</option>' +
    trips.map(t => `<option value="${t.id}" data-price="${t.price_per_person}">${t.title} — $${t.price_per_person}/person</option>`).join('');
  sel.onchange = updatePricePreview;
  document.getElementById('b-travelers').oninput = updatePricePreview;
}

function updatePricePreview() {
  const sel = document.getElementById('b-trip');
  const opt = sel.options[sel.selectedIndex];
  const travelers = parseInt(document.getElementById('b-travelers').value) || 1;
  const preview = document.getElementById('price-preview');
  if (opt && opt.dataset.price) {
    const total = parseFloat(opt.dataset.price) * travelers;
    document.getElementById('price-preview-val').textContent = `$${total.toLocaleString()}`;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function goBook(tripId) {
  switchTab('book', document.querySelectorAll('.nav-tab')[1]);
  setTimeout(() => {
    const sel = document.getElementById('b-trip');
    sel.value = tripId;
    updatePricePreview();
  }, 100);
}

async function bookTrip() {
  const name = document.getElementById('b-name').value.trim();
  const email = document.getElementById('b-email').value.trim();
  const tripId = document.getElementById('b-trip').value;
  const travelers = parseInt(document.getElementById('b-travelers').value);
  const msg = document.getElementById('book-msg');

  if (!name || !email || !tripId || !travelers) {
    showMsg(msg, 'Please fill in all fields.', 'error'); return;
  }

  try {
    let userRes = await fetch(`${API}/users/`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email})
    });
    let user;
    if (userRes.status === 400) {
      const all = await fetch(`${API}/users/`).then(r => r.json());
      user = all.find(u => u.email === email);
    } else { user = await userRes.json(); }

    if (!user) { showMsg(msg, 'Could not create account.', 'error'); return; }

    const bookRes = await fetch(`${API}/bookings/`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: user.id, trip_id: tripId, num_travelers: travelers})
    });
    const booking = await bookRes.json();

    if (!bookRes.ok) { showMsg(msg, booking.detail || 'Booking failed.', 'error'); return; }

    showMsg(msg, `Booking confirmed! Total: $${booking.total_price.toLocaleString()}. Save your booking ID: ${booking.id}`, 'success');
    document.getElementById('b-name').value = '';
    document.getElementById('b-email').value = '';
    document.getElementById('b-trip').value = '';
    document.getElementById('price-preview').style.display = 'none';
  } catch(e) {
    showMsg(msg, 'Network error. Please try again.', 'error');
  }
}

async function lookupBookings() {
  const email = document.getElementById('lookup-email').value.trim();
  const msg = document.getElementById('lookup-msg');
  const list = document.getElementById('bookings-list');
  if (!email) { showMsg(msg, 'Please enter your email.', 'error'); return; }
  msg.className = 'msg';
  list.innerHTML = '<div class="loading">Looking up bookings...</div>';

  try {
    const all = await fetch(`${API}/users/`).then(r => r.json());
    const user = all.find(u => u.email === email);
    if (!user) { showMsg(msg, 'No account found with that email.', 'error'); list.innerHTML = ''; return; }

    const bookings = await fetch(`${API}/bookings/user/${user.id}`).then(r => r.json());
    if (!bookings.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No bookings found for this email.</p></div>'; return; }

    list.innerHTML = bookings.map(b => `
      <div class="booking-card" id="bc-${b.id}">
        <div class="booking-header">
          <div class="booking-id">Booking ID: ${b.id.slice(0,16)}...</div>
          <div class="status-badge ${b.status === 'confirmed' ? 'status-confirmed' : 'status-cancelled'}">${b.status.toUpperCase()}</div>
        </div>
        <div class="booking-detail">
          <div class="detail-item"><label>Travelers</label><span>${b.num_travelers}</span></div>
          <div class="detail-item"><label>Total Paid</label><span>$${b.total_price.toLocaleString()}</span></div>
          <div class="detail-item"><label>Booked On</label><span>${b.booked_at.split('T')[0]}</span></div>
        </div>
        ${b.status === 'confirmed'
          ? `<button class="btn btn-danger" onclick="cancelBooking('${b.id}', this)">Cancel Booking</button>`
          : `<p style="font-size:13px;color:#484f58;">Cancelled on ${b.cancelled_at ? b.cancelled_at.split('T')[0] : '—'}</p>`}
        <div id="cancel-result-${b.id}"></div>
      </div>`).join('');
  } catch(e) {
    showMsg(msg, 'Network error. Please try again.', 'error');
    list.innerHTML = '';
  }
}

async function cancelBooking(id, btn) {
  btn.disabled = true; btn.textContent = 'Cancelling...';
  try {
    const res = await fetch(`${API}/bookings/${id}/cancel`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})
    });
    const data = await res.json();
    if (!res.ok) { btn.disabled = false; btn.textContent = 'Cancel Booking'; return; }

    btn.style.display = 'none';
    document.getElementById(`cancel-result-${id}`).innerHTML = `
      <div class="refund-result">
        <h4>Cancellation Confirmed</h4>
        <div class="refund-grid">
          <div class="refund-item"><label>Refund Amount</label><span>$${data.refund_amount.toLocaleString()}</span></div>
          <div class="refund-item"><label>Refund %</label><span>${(data.refund_percentage * 100).toFixed(0)}%</span></div>
          <div class="refund-item"><label>Days Before Trip</label><span>${data.days_before_trip}</span></div>
        </div>
      </div>`;
    document.querySelector(`#bc-${id} .status-badge`).className = 'status-badge status-cancelled';
    document.querySelector(`#bc-${id} .status-badge`).textContent = 'CANCELLED';
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Cancel Booking';
  }
}

function showMsg(el, text, type) {
  el.textContent = text; el.className = `msg ${type}`;
}

loadTrips();
</script>
</body>
</html>
